<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Organigramme des entreprises du Québec</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #2f6ebd;
      color: white;
      padding: 1rem;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    #search-container {
      padding: 1rem;
    }
    #search-results {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ddd;
    }
    #search-results li {
      padding: 0.5rem;
      cursor: pointer;
    }
    #search-results li:hover {
      background-color: #f0f0f0;
    }
    #graph {
      width: 100%;
      height: 600px;
      border-top: 1px solid #ccc;
    }
    .link {
      stroke: #999;
      stroke-opacity: 0.6;
    }
    .node {
      cursor: pointer;
    }
    .node circle {
      stroke: #fff;
      stroke-width: 1.5px;
    }
    .tooltip {
      position: absolute;
      text-align: center;
      padding: 4px;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      border-radius: 4px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Organigramme des entreprises du Québec</h1>
  </header>
  <div id="search-container">
    <label for="search-input">Recherche :</label>
    <input id="search-input" type="text" placeholder="Nom ou NEQ" autofocus>
    <ul id="search-results"></ul>
  </div>
  <div id="graph"></div>

  <script>
    (function() {
      const searchInput = document.getElementById('search-input');
      const searchResults = document.getElementById('search-results');
      let timeoutId = null;

      function performSearch(query) {
        if (!query) {
          searchResults.innerHTML = '';
          return;
        }
        fetch('/api/search?q=' + encodeURIComponent(query))
          .then(resp => resp.json())
          .then(data => {
            searchResults.innerHTML = '';
            data.forEach(item => {
              const li = document.createElement('li');
              li.textContent = `${item.name} (NEQ : ${item.neq})`;
              li.onclick = () => selectEntity(item);
              searchResults.appendChild(li);
            });
          });
      }

      function selectEntity(item) {
        searchResults.innerHTML = '';
        searchInput.value = `${item.name}`;
        loadNetwork(item.neq);
      }

      function loadNetwork(neq) {
        fetch('/api/network?neq=' + encodeURIComponent(neq))
          .then(resp => resp.json())
          .then(data => {
            drawGraph(data, neq);
          });
      }

      function drawGraph(data, selectedNeq) {
        const width = document.getElementById('graph').clientWidth;
        const height = document.getElementById('graph').clientHeight;
        const svg = d3.select('#graph').html('').append('svg')
          .attr('width', width)
          .attr('height', height);

        const tooltip = d3.select('body').append('div')
          .attr('class', 'tooltip')
          .style('opacity', 0);

        const link = svg.append('g')
          .attr('class', 'links')
          .selectAll('line')
          .data(data.links)
          .enter().append('line')
          .attr('class', 'link')
          .attr('stroke-width', 1.5);

        const node = svg.append('g')
          .attr('class', 'nodes')
          .selectAll('g')
          .data(data.nodes)
          .enter().append('g')
          .attr('class', 'node')
          .call(d3.drag()
            .on('start', dragstarted)
            .on('drag', dragged)
            .on('end', dragended));

        node.append('circle')
          .attr('r', 6)
          .attr('fill', d => d.id === selectedNeq ? '#2f6ebd' : '#69b3a2');

        node.append('text')
          .attr('x', 8)
          .attr('y', 3)
          .text(d => d.name)
          .style('font-size', '10px');

        node.on('mouseover', (event, d) => {
          tooltip.transition().duration(200).style('opacity', 0.9);
          tooltip.html(`<strong>${d.name}</strong><br/>NEQ : ${d.id}`)
            .style('left', (event.pageX + 10) + 'px')
            .style('top', (event.pageY - 28) + 'px');
        }).on('mouseout', () => {
          tooltip.transition().duration(500).style('opacity', 0);
        });

        const simulation = d3.forceSimulation(data.nodes)
          .force('link', d3.forceLink(data.links).id(d => d.id).distance(120))
          .force('charge', d3.forceManyBody().strength(-300))
          .force('center', d3.forceCenter(width / 2, height / 2));

        simulation.on('tick', () => {
          link
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);
          node.attr('transform', d => `translate(${d.x},${d.y})`);
        });

        function dragstarted(event, d) {
          if (!event.active) simulation.alphaTarget(0.3).restart();
          d.fx = d.x;
          d.fy = d.y;
        }
        function dragged(event, d) {
          d.fx = event.x;
          d.fy = event.y;
        }
        function dragended(event, d) {
          if (!event.active) simulation.alphaTarget(0);
          d.fx = null;
          d.fy = null;
        }
      }

      searchInput.addEventListener('input', () => {
        clearTimeout(timeoutId);
        const value = searchInput.value.trim();
        timeoutId = setTimeout(() => {
          performSearch(value);
        }, 300);
      });
    })();
  </script>
</body>
</html>
